<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – COMPESA</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0f18;
        color: #e2e8f0;
        overflow: hidden;
      }
      .bg-gradient {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0a0f18 0%, #0f172a 50%, #0a0f18 100%);
        opacity: 0.9;
      }
      .bg-glow {
        position: fixed;
        top: 20%;
        left: 20%;
        width: 20rem;
        height: 20rem;
        background: rgba(16, 185, 129, 0.08);
        border-radius: 50%;
        filter: blur(80px);
      }
      .bg-glow-2 {
        position: fixed;
        bottom: 20%;
        right: 20%;
        width: 24rem;
        height: 24rem;
        background: rgba(139, 92, 246, 0.06);
        border-radius: 50%;
        filter: blur(80px);
      }
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 24rem;
        padding: 2.5rem;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 1.5rem;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(16, 185, 129, 0.05);
        text-align: center;
      }
      .logo {
        margin-bottom: 2rem;
      }
      .logo h1 {
        font-size: 2.5rem;
        font-weight: 800;
        color: #10b981;
        letter-spacing: -0.02em;
      }
      .logo p {
        font-size: 0.65rem;
        letter-spacing: 0.3em;
        color: rgba(16, 185, 129, 0.6);
        text-transform: uppercase;
        margin-top: 0.25rem;
      }
      .login-logos {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        margin-bottom: 1.5rem;
        min-height: 70px;
      }
      .login-logos img {
        max-height: 64px;
        max-width: 180px;
        width: auto;
        height: auto;
        object-fit: contain;
        filter: brightness(1.05);
      }
      .login-logos .logo-cetesb { max-width: 150px; }
      .login-logos .logo-orbty { max-width: 180px; }
      .login-logos .logo-wrap { display: flex; align-items: center; justify-content: center; min-width: 100px; }
      .login-logos .logo-fallback { font-size: 1.1rem; font-weight: 700; }
      .tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .tabs button {
        flex: 1;
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        background: rgba(255,255,255,0.05);
        color: #94a3b8;
        border: 1px solid rgba(255,255,255,0.08);
      }
      .tabs button:hover {
        color: #e2e8f0;
        background: rgba(255,255,255,0.08);
      }
      .tabs button.active {
        color: #0a0f18;
        border-color: transparent;
      }
      .tabs button.active.operator {
        background: #10b981;
      }
      .tabs button.active.admin {
        background: #a855f7;
        color: #fff;
      }
      .form input {
        width: 100%;
        padding: 1rem;
        margin-bottom: 1rem;
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 0.75rem;
        background: #0a0f18;
        color: #e2e8f0;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .form input::placeholder {
        color: #64748b;
      }
      .form input:focus {
        border-color: #10b981;
      }
      .btn-login {
        width: 100%;
        padding: 1rem 1.5rem;
        margin-top: 1rem;
        border: none;
        border-radius: 0.75rem;
        font-size: 1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-login.operator {
        background: #10b981;
        color: #0a0f18;
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
      }
      .btn-login.admin {
        background: #a855f7;
        color: #fff;
        box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
      }
      .btn-login:hover {
        transform: scale(1.02);
      }
      .hint {
        margin-top: 1.5rem;
        font-size: 0.75rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="bg-gradient"></div>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="card">
      <div class="login-logos">
        <div class="logo-wrap">
          <img src="asset/compesa/compesa-seeklogo.png" alt="COMPESA" class="logo-cetesb" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" />
          <span class="logo-fallback" style="display:none; color: rgba(255,255,255,0.85);">COMPESA</span>
        </div>
        <div class="logo-wrap">
          <img src="asset/compesa/ORBTY%20logotipo%20negativo%20300.png" alt="COMPESA" class="logo-orbty" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';" />
          <span class="logo-fallback" style="display:none; color: #10b981;">COMPESA</span>
        </div>
      </div>
      <div class="logo">
        <h1>COMPESA</h1>
        <p>Monitoramento Ambiental</p>
      </div>

      <div class="tabs">
        <button type="button" class="operator active" data-type="operator">Usuário</button>
        <button type="button" class="admin" data-type="admin">Admin</button>
      </div>

      <form class="form" id="login-form">
        <input type="text" id="username" placeholder="Usuário" required autocomplete="username" />
        <input type="password" id="password" placeholder="Senha" required autocomplete="current-password" />
        <button type="submit" class="btn-login operator" id="btn-login">Acessar mapa</button>
      </form>

      <p class="hint" id="hint">Monitoramento de Alterações</p>
    </div>

    <script>
      (function () {
        var type = "operator";
        var tabs = document.querySelectorAll(".tabs button");
        var btnLogin = document.getElementById("btn-login");
        var hint = document.getElementById("hint");
        var form = document.getElementById("login-form");

        tabs.forEach(function (t) {
          t.addEventListener("click", function () {
            type = t.getAttribute("data-type");
            tabs.forEach(function (b) {
              b.classList.remove("active");
              b.classList.remove("operator", "admin");
            });
            t.classList.add("active");
            t.classList.add(type);
            btnLogin.textContent = type === "admin" ? "Acessar painel admin" : "Acessar mapa";
            btnLogin.className = "btn-login " + type;
            hint.textContent = type === "admin" ? "Painel de Administração" : "Monitoramento de Alterações";
          });
        });

        function setBusy(b) {
          btnLogin.disabled = !!b;
          btnLogin.style.opacity = b ? "0.75" : "1";
          btnLogin.style.cursor = b ? "not-allowed" : "pointer";
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var user = document.getElementById("username").value.trim();
          var pass = document.getElementById("password").value;
          if (!user || !pass) {
            alert("Preencha usuário e senha.");
            return;
          }
          setBusy(true);
          fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: user, password: pass, role: type }),
          })
            .then(function (r) {
              if (!r.ok) return r.json().catch(function () { return null; }).then(function (j) {
                throw new Error((j && j.message) || "Falha no login.");
              });
              return r.json();
            })
            .then(function () {
              window.location.href = type === "admin" ? "admin.html" : "index.html";
            })
            .catch(function (err) {
              alert(err && err.message ? err.message : "Falha no login.");
            })
            .finally(function () {
              setBusy(false);
            });
        });
      })();
    </script>
  </body>
</html>
